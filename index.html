<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL_ALPHA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-panel" style="display:none;">
        CPU: 42% | RAM: 14GB<br>HORA: <span id="relogio"></span>
    </div>
    
    <div id="container">
        <div id="boot-screen"><h1>> INICIALIZANDO...</h1><p id="boot-log">Carregando...</p></div>
        
        <div id="login-screen" style="display:none; text-align: center;">
            <h1>> ACESSO RESTRITO</h1>
            <input type="password" id="senha" placeholder="SENHA (6 DÍGITOS)" maxlength="6" style="display: block; width: 100%; margin: 10px auto; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; text-align: center;">
            <button class="botao" style="width: 100%; margin: 10px auto;" onclick="check()">ENTRAR</button>
        </div>
        
        <div id="menu-screen" style="display:none;">
            <h1>> SISTEMA_DE_ARQUIVOS</h1>
            
            <a class="botao" href="carta.html">> abrir_carta.log</a>
            
            <a class="botao" style="opacity: 0.5; cursor: default; border-color: #555; color: #555;">> EM_MANUTENÇÃO</a>

            <div class="creditos">
                <p>SISTEMA DE: L*** H*******</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Lógica de Inicialização e Login
        window.onload = () => {
            if (sessionStorage.getItem('logado') === 'true') {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'block';
                document.getElementById('status-panel').style.display = 'block';
            } else {
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'block';
                }, 2000);
            }
            setInterval(() => {
                const r = document.getElementById('relogio');
                if(r) r.innerText = new Date().toLocaleTimeString();
            }, 1000);
        };

        function check() {
            if(document.getElementById('senha').value === "240625") {
                sessionStorage.setItem('logado', 'true');
                location.reload();
            } else { alert("ACESSO NEGADO"); }
        }

        // 2. Sistema de Pop-up
        function criarPopUpAleatorio() {
            const frases = ["SISTEMA: ENTRADA NÃO AUTORIZADA", "AVISO: MEMÓRIA SOBRECARREGADA", "ERRO: ARQUIVO CORROMPIDO", "ALERTA: ATIVIDADE SUSPEITA"];
            const msg = frases[Math.floor(Math.random() * frases.length)];
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            const top = Math.floor(Math.random() * 60);
            const left = Math.floor(Math.random() * 60);
            modal.innerHTML = `
                <div class="modal-box" style="top: ${top}%; left: ${left}%;">
                    <div class="modal-header">
                        <span style="font-weight: bold;">AVISO_CRÍTICO</span>
                        <button class="close-btn" onclick="this.parentElement.parentElement.parentElement.remove()">FECHAR</button>
                    </div>
                    <div class="modal-body">
                        <p style="margin: 10px 0; font-size: 14px;">${msg}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        setInterval(criarPopUpAleatorio, 8000);

        // 3. Sistema de Áudio
        const clickSound = new Audio('click.mp3');
        function playClick() {
            clickSound.currentTime = 0;
            clickSound.play().catch(e => console.log("Áudio aguardando interação."));
        }
        document.querySelectorAll('.botao').forEach(botao => {
            botao.addEventListener('click', playClick);
        });
    </script>
</body>
</html>
