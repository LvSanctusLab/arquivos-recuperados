<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL_ALPHA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-panel" style="display:none;">
        CPU: 42% | RAM: 14GB<br>HORA: <span id="relogio"></span>
    </div>
    
    <div id="container">
        <div id="boot-screen"><h1>> INICIALIZANDO...</h1><p id="boot-log">Carregando...</p></div>
        <div id="login-screen" style="display:none; text-align: center;">
    <h1>> ACESSO RESTRITO</h1>
    <input type="password" id="senha" placeholder="SENHA (6 DÍGITOS)" maxlength="6" style="display: block; width: 100%; margin: 10px auto; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; text-align: center;">
    <button class="botao" style="width: 100%; margin: 10px auto;" onclick="check()">ENTRAR</button>
</div>
        <div id="menu-screen" style="display:none;">
            <h1>> SISTEMA_DE_ARQUIVOS</h1>
            <a class="botao" href="carta.html">> abrir_carta.log</a>
            <a class="botao" href="fisica.html">> abrir_fisica.txt</a>
        </div>
    </div>
<div id="popup-terminal" style="display:none;">
    <span id="popup-text"></span>
</div>

    <script>
        window.onload = () => {
            if (sessionStorage.getItem('logado') === 'true') {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'block';
                document.getElementById('status-panel').style.display = 'block';
            } else {
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'block';
                }, 2000);
            }
            setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);
        };
        function check() {
            if(document.getElementById('senha').value === "240625") {
                sessionStorage.setItem('logado', 'true');
                location.reload();
            } else { alert("ACESSO NEGADO"); }
        }
       const frases = [
    "> ISSO ESTÁ FUNCIONANDO?",
    "> VOCÊ CONSEGUE ME OUVIR?",
    "> SINCRONIZANDO DADOS...",
    "> AVISO: ARQUIVO CORROMPIDO",
    "> CONEXÃO FRACA",
    "> ISSO É REAL?"
];

function mostrarPopup() {
    const popup = document.getElementById('popup-terminal');
    const texto = document.getElementById('popup-text');
    
    // Escolhe uma frase aleatória
    texto.innerText = frases[Math.floor(Math.random() * frases.length)];
    
    // Posiciona em algum lugar aleatório da tela (entre 5% e 80% da tela)
    popup.style.top = Math.floor(Math.random() * 80) + "%";
    popup.style.left = Math.floor(Math.random() * 80) + "%";
    
    // Mostra
    popup.style.display = 'block';
    
    // Esconde depois de 4 segundos
    setTimeout(() => {
        popup.style.display = 'none';
    }, 4000);
}

// Configura o intervalo (12000ms = 12 segundos)
setInterval(mostrarPopup, 12000);
 
    </script>
</body>
</html>
