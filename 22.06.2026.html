<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA_ALPHA</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <script>
        if (sessionStorage.getItem('logado') !== 'true') window.location.href = 'index.html';
    </script>

    <div id="status-panel">CPU: 42% | HORA: <span id="relogio"></span></div>
    
    <div id="container">
        <h1>> 22.06.2026</h1>

        <!-- COLOQUE SEUS PARÁGRAFOS ABAIXO -->
        <p>Texto do primeiro parágrafo...</p>
        <p>Texto do segundo parágrafo...</p>

        <hr style="border: 0; border-top: 1px solid #0f0; margin: 20px 0;">
        <a class="botao" href="carta.html">> voltar</a>
    </div>

    <script>
        // Relógio
        setInterval(() => {
            const r = document.getElementById('relogio');
            if(r) r.innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Sistema de Pop-up Multiplicável
        function criarPopUpAleatorio() {
            const frases = [
                "????: EU GOSTO MUITO DE VOCÊ",
                "????: EU QUERO UM FUTURO COM VOCÊ.",
                "ERRO: ARQUIVO CORROMPIDO",
                "ALERTA: ATIVIDADE SUSPEITA",
                "TÔ TE VENDO KKKK."
            ];
            
            const msg = frases[Math.floor(Math.random() * frases.length)];
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            
            const top = Math.floor(Math.random() * 50) + 10;
            const left = Math.floor(Math.random() * 50) + 10;
            
            modal.innerHTML = `
                <div class="modal-box" style="top: ${top}%; left: ${left}%;">
                    <div class="modal-header">
                        <span style="font-weight: bold;">AVISO_CRÍTICO</span>
                        <button class="close-btn" onclick="this.parentElement.parentElement.parentElement.remove()">FECHAR</button>
                    </div>
                    <div class="modal-body">
                        <p style="margin: 10px 0; font-size: 14px;">${msg}</p>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        }

        // Dispara um novo pop-up a cada 10 segundos
        setInterval(criarPopUpAleatorio, 10000);
    </script>
</body>
</html>
